<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM OFC | PRO PORTAL</title>
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #ff4757;
            --accent: #ff9f43;
            --bg: #0b0b0b;
            --card: #151515;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 30px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            border: 1px solid #222;
            position: relative;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .page { display: none; animation: fadeIn 0.4s ease-in-out; }
        .active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            display: block;
            background: #1e1e1e;
            color: white;
            text-decoration: none;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid #333;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover {
            background: var(--primary);
            color: #000;
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .btn-back {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            margin-top: 20px;
            font-size: 0.8rem;
        }

        .notice {
            background: rgba(255, 71, 87, 0.1);
            color: var(--secondary);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-bottom: 20px;
            border: 1px solid var(--secondary);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            text-align: center;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .coming-soon {
            color: var(--accent);
            padding: 20px;
            border: 1px dashed var(--accent);
            border-radius: 10px;
        }
    </style>
</head>
